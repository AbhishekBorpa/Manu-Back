services:
  - type: web
    name: manu-backend
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5001
      - key: FRONTEND_URL
        value: https://your-frontend-url.onrender.com
      - key: RENDER_URL
        value: https://manu-backend.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

